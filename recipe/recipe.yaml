context:
  version: "30.0.3"

package:
  name: create-jest
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/create-jest/-/create-jest-${{ version }}.tgz
  sha256: 7d4b909e04c4c49edf086ce81387ce2274ce312e6a09d4d532feea4378bea417

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - create-jest 2>&1 | grep -q 'Could not find a "package.json"'

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Create a new Jest project
  homepage: https://github.com/jestjs/jest
  repository: https://github.com/jestjs/jest

extra:
  recipe-maintainers:
    - danielnachun
