context:
  version: "30.0.0"

package:
  name: create-jest
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/create-jest/-/create-jest-${{ version }}.tgz
  sha256: f5520f34737d97cc5e2bd48dffafa61cb514a155159791a5cd81db9abe54dc15

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - create-jest 2>&1 | grep -q 'Could not find a "package.json"'

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Create a new Jest project
  homepage: https://github.com/jestjs/jest
  repository: https://github.com/jestjs/jest

extra:
  recipe-maintainers:
    - danielnachun
